<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MK Studio — Prévisualisation des e-mails</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d0d0d; color: #e5e5e5; display: flex; height: 100vh; overflow: hidden; }

    /* Sidebar */
    #sidebar {
      width: 260px; min-width: 260px; background: #111; border-right: 1px solid #1f1f1f;
      display: flex; flex-direction: column; overflow-y: auto;
    }
    #sidebar header {
      padding: 20px 16px 16px;
      border-bottom: 1px solid #1f1f1f;
    }
    #sidebar header .logo {
      display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
    }
    #sidebar header .logo-icon {
      width: 32px; height: 32px; background: linear-gradient(135deg,#D4AF37,#B8941E);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 12px; color: #000; flex-shrink: 0;
    }
    #sidebar header .logo-name { color: #D4AF37; font-weight: 700; font-size: 15px; }
    #sidebar header p { color: #555; font-size: 11px; margin-top: 2px; }

    #sidebar nav { padding: 8px 0; flex: 1; }
    #sidebar nav .section-title {
      padding: 12px 16px 4px; font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.8px; color: #444;
    }
    #sidebar nav button {
      width: 100%; text-align: left; background: none; border: none;
      padding: 9px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px;
      color: #888; font-size: 13px; transition: background 0.15s, color 0.15s;
      border-radius: 0;
    }
    #sidebar nav button:hover { background: #1a1a1a; color: #ccc; }
    #sidebar nav button.active { background: #1a1a1a; color: #D4AF37; }
    #sidebar nav button .badge {
      font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; margin-left: auto;
    }
    .badge-green { background: #16a34a22; color: #4ade80; border: 1px solid #16a34a44; }
    .badge-orange { background: #f9731633; color: #fb923c; border: 1px solid #f9731644; }
    .badge-gold { background: #D4AF3722; color: #D4AF37; border: 1px solid #D4AF3744; }
    .badge-purple { background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed44; }

    /* Main area */
    #main {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    #topbar {
      padding: 14px 24px; background: #111; border-bottom: 1px solid #1f1f1f;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    #topbar .email-title { font-size: 14px; font-weight: 600; color: #e5e5e5; }
    #topbar .email-subject { font-size: 12px; color: #555; margin-top: 2px; }
    #topbar .device-btns { display: flex; gap: 6px; }
    #topbar .device-btn {
      background: #1a1a1a; border: 1px solid #2a2a2a; color: #666;
      font-size: 11px; padding: 5px 10px; border-radius: 6px; cursor: pointer;
      transition: all 0.15s;
    }
    #topbar .device-btn:hover, #topbar .device-btn.active { background: #D4AF3722; color: #D4AF37; border-color: #D4AF3744; }

    #preview-wrap {
      flex: 1; overflow-y: auto; background: #1a1a1a; padding: 24px; display: flex; justify-content: center; align-items: flex-start;
    }
    #preview-frame-wrap {
      background: #fff; border-radius: 4px; overflow: hidden; transition: width 0.2s;
      width: 100%; max-width: 700px; box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }
    #preview-frame-wrap.mobile { max-width: 390px; }
    iframe {
      width: 100%; border: none; display: block;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <header>
    <div class="logo">
      <div class="logo-icon">MK</div>
      <div class="logo-name">MK Studio</div>
    </div>
    <p>7 modèles d'e-mail</p>
  </header>
  <nav>
    <div class="section-title">Membres</div>
    <button class="active" onclick="show(0, this)">
      🎉 Bienvenue
      <span class="badge badge-green">Nouveau compte</span>
    </button>
    <button onclick="show(1, this)">
      ✅ Confirmation inscription
      <span class="badge badge-green">Réservation</span>
    </button>
    <button onclick="show(2, this)">
      ❌ Annulation membre
      <span class="badge badge-orange">Annulation</span>
    </button>
    <button onclick="show(3, this)">
      💳 Confirmation achat
      <span class="badge badge-gold">Achat</span>
    </button>
    <button onclick="show(6, this)">
      ⏰ Rappel 24h
      <span class="badge badge-purple">Cron</span>
    </button>

    <div class="section-title" style="margin-top:8px;">Admin</div>
    <button onclick="show(4, this)">
      🎯 Séance individuelle
      <span class="badge badge-green">Admin</span>
    </button>
    <button onclick="show(5, this)">
      👥 Séance duo
      <span class="badge badge-green">Admin</span>
    </button>
    <button onclick="show(7, this)">
      🚫 Cours annulé (coach)
      <span class="badge badge-orange">Admin</span>
    </button>
  </nav>
</div>

<div id="main">
  <div id="topbar">
    <div>
      <div class="email-title" id="email-title">Bienvenue chez MK Studio</div>
      <div class="email-subject" id="email-subject">Objet : Bienvenue chez MK Studio 🏋️</div>
    </div>
    <div class="device-btns">
      <button class="device-btn active" onclick="setDevice('desktop', this)">🖥 Desktop</button>
      <button class="device-btn" onclick="setDevice('mobile', this)">📱 Mobile</button>
    </div>
  </div>
  <div id="preview-wrap">
    <div id="preview-frame-wrap">
      <iframe id="frame" scrolling="no"></iframe>
    </div>
  </div>
</div>

<script>
const SITE_URL = "https://mkstudio.fr";

function layout(content) {
  return `<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="margin:0;padding:0;background:#0a0a0a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0a0a0a;min-height:100vh;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;">
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <div style="width:56px;height:56px;background:linear-gradient(135deg,#D4AF37,#B8941E);border-radius:14px;margin:0 auto 12px auto;">
                <span style="color:#000;font-weight:800;font-size:20px;line-height:56px;display:block;text-align:center;">MK</span>
              </div>
              <div style="color:#D4AF37;font-size:22px;font-weight:700;letter-spacing:0.5px;">MK Studio</div>
            </td>
          </tr>
          <tr>
            <td style="background:#111111;border:1px solid #1f1f1f;border-radius:16px;padding:32px 28px;">
              ${content}
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="color:#3a3a3a;font-size:12px;margin:0;">
                MK Studio · <a href="${SITE_URL}" style="color:#3a3a3a;text-decoration:none;">mkstudio.fr</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>`;
}

const divider = `<div style="height:1px;background:#1f1f1f;margin:24px 0;"></div>`;
const btn = (text, href) => `<a href="${href}" style="display:inline-block;background:linear-gradient(135deg,#D4AF37,#B8941E);color:#000;font-weight:700;font-size:14px;padding:12px 28px;border-radius:10px;text-decoration:none;margin-top:8px;">${text}</a>`;
const row = (label, value) => `<tr><td style="padding:8px 0;color:#6b7280;font-size:13px;">${label}</td><td style="padding:8px 0;color:#ffffff;font-size:13px;font-weight:500;text-align:right;">${value}</td></tr>`;

const emails = [
  // 0 — Bienvenue
  {
    title: "Bienvenue chez MK Studio",
    subject: "Bienvenue chez MK Studio 🏋️",
    html: layout(`
      <h1 style="color:#ffffff;font-size:22px;font-weight:700;margin:0 0 8px;">Bienvenue chez MK Studio ! 🎉</h1>
      <p style="color:#9ca3af;font-size:14px;margin:0 0 24px;">Bonjour Samy, ton compte est prêt.</p>
      ${divider}
      <p style="color:#d1d5db;font-size:14px;line-height:1.7;margin:0 0 20px;">
        Tu fais maintenant partie de la communauté MK Studio. Tu peux dès maintenant consulter le planning, t'inscrire aux cours collectifs et suivre tes séances.
      </p>
      <p style="color:#d1d5db;font-size:14px;line-height:1.7;margin:0 0 28px;">
        Pour réserver des cours, assure-toi d'avoir des séances disponibles dans ton solde. N'hésite pas à contacter ton coach pour en savoir plus sur les offres disponibles.
      </p>
      <div style="text-align:center;">
        ${btn("Accéder à mon espace", `${SITE_URL}/dashboard`)}
      </div>
    `)
  },

  // 1 — Confirmation inscription (collectif, avec invité, avec politique annulation)
  {
    title: "Confirmation d'inscription",
    subject: "Inscription confirmée — Yoga Flow",
    html: layout(`
      <div style="display:inline-block;background:#16a34a22;border:1px solid #16a34a44;border-radius:8px;padding:6px 14px;margin-bottom:20px;">
        <span style="color:#4ade80;font-size:13px;font-weight:600;">✓ Inscription confirmée</span>
      </div>
      <h1 style="color:#ffffff;font-size:20px;font-weight:700;margin:0 0 6px;">Yoga Flow</h1>
      <p style="color:#9ca3af;font-size:14px;margin:0 0 24px;">Bonjour Samy, ta réservation est confirmée.</p>
      ${divider}
      <table width="100%" cellpadding="0" cellspacing="0">
        ${row("Date", "Jeudi 19 mars 2026")}
        ${row("Horaire", "10h00 – 11h00")}
        ${row("Coach", "Manon")}
        ${row("Invité(s)", "Léa Dupont")}
      </table>
      ${divider}
      <div style="background:#f9731611;border:1px solid #f9731633;border-radius:10px;padding:14px;margin-bottom:24px;">
        <p style="color:#fb923c;font-size:13px;font-weight:600;margin:0 0 6px;">⚠️ Politique d'annulation</p>
        <p style="color:#d1d5db;font-size:13px;line-height:1.6;margin:0;">
          Tu peux annuler ton inscription directement depuis ton espace MK Studio, <strong style="color:#ffffff;">jusqu'à 3h avant le cours</strong>. Passé ce délai, la séance sera décomptée de ton solde.
        </p>
      </div>
      <div style="text-align:center;">
        ${btn("Voir mon planning", `${SITE_URL}/dashboard`)}
      </div>
    `)
  },

  // 2 — Annulation par le membre
  {
    title: "Annulation d'inscription",
    subject: "Annulation — Pilates Core",
    html: layout(`
      <div style="display:inline-block;background:#f9731633;border:1px solid #f9731644;border-radius:8px;padding:6px 14px;margin-bottom:20px;">
        <span style="color:#fb923c;font-size:13px;font-weight:600;">Inscription annulée</span>
      </div>
      <h1 style="color:#ffffff;font-size:20px;font-weight:700;margin:0 0 6px;">Pilates Core</h1>
      <p style="color:#9ca3af;font-size:14px;margin:0 0 24px;">Bonjour Samy, ton annulation a bien été prise en compte.</p>
      ${divider}
      <table width="100%" cellpadding="0" cellspacing="0">
        ${row("Date", "Mardi 17 mars 2026")}
        ${row("Horaire", "09h00 – 10h00")}
        ${row("Séances remboursées", "1 séance (solde collectif)")}
      </table>
      ${divider}
      <p style="color:#d1d5db;font-size:14px;line-height:1.7;margin:0 0 20px;">
        Tes séances ont été créditées sur ton compte. Tu peux te réinscrire à un autre cours depuis ton espace.
      </p>
      <div style="text-align:center;">
        ${btn("Voir le planning", `${SITE_URL}/dashboard/planning`)}
      </div>
    `)
  },

  // 3 — Confirmation d'achat
  {
    title: "Confirmation d'achat",
    subject: "Confirmation d'achat — Pack 10 séances collectifs (MKS-2026-042)",
    html: layout(`
      <div style="display:inline-block;background:#D4AF3722;border:1px solid #D4AF3744;border-radius:8px;padding:6px 14px;margin-bottom:20px;">
        <span style="color:#D4AF37;font-size:13px;font-weight:600;">Achat confirmé</span>
      </div>
      <h1 style="color:#ffffff;font-size:20px;font-weight:700;margin:0 0 6px;">Pack 10 séances collectifs</h1>
      <p style="color:#9ca3af;font-size:14px;margin:0 0 24px;">Bonjour Samy, ton achat a bien été enregistré.</p>
      ${divider}
      <table width="100%" cellpadding="0" cellspacing="0">
        ${row("Produit", "Pack 10 séances collectifs")}
        ${row("Montant", "150,00 €")}
        ${row("Séances créditées", "10 séances (solde collectif)")}
        ${row("N° facture", "MKS-2026-042")}
      </table>
      ${divider}
      <p style="color:#d1d5db;font-size:14px;line-height:1.7;margin:0 0 24px;">
        Tes séances ont été ajoutées à ton solde collectif. Tu peux maintenant réserver tes cours.
      </p>
      <div style="text-align:center;margin-bottom:16px;">
        ${btn("Télécharger ma facture", `${SITE_URL}/api/invoices/abc-123`)}
      </div>
      <div style="text-align:center;">
        ${btn("Voir le planning", `${SITE_URL}/dashboard/planning`)}
      </div>
    `)
  },

  // 4 — Séance individuelle (admin)
  {
    title: "Séance individuelle confirmée",
    subject: "Séance individuelle confirmée — Coaching perso",
    html: layout(`
      <div style="display:inline-block;background:#16a34a22;border:1px solid #16a34a44;border-radius:8px;padding:6px 14px;margin-bottom:20px;">
        <span style="color:#4ade80;font-size:13px;font-weight:600;">✓ Séance individuelle confirmée</span>
      </div>
      <h1 style="color:#ffffff;font-size:20px;font-weight:700;margin:0 0 6px;">Coaching perso</h1>
      <p style="color:#9ca3af;font-size:14px;margin:0 0 24px;">Bonjour Samy, ta séance individuelle est planifiée.</p>
      ${divider}
      <table width="100%" cellpadding="0" cellspacing="0">
        ${row("Date", "Lundi 24 mars 2026")}
        ${row("Horaire", "09h00 – 10h00")}
        ${row("Coach", "Manon")}
        ${row("Récurrence", "Chaque semaine")}
      </table>
      ${divider}
      <div style="background:#f9731611;border:1px solid #f9731633;border-radius:10px;padding:14px;margin-bottom:24px;">
        <p style="color:#fb923c;font-size:13px;font-weight:600;margin:0 0 6px;">⚠️ Politique d'annulation</p>
        <p style="color:#d1d5db;font-size:13px;line-height:1.6;margin:0;">
          Pour annuler, contacte ton coach <strong style="color:#ffffff;">au moins 24h à l'avance</strong>. Sans annulation dans ce délai, la séance sera décomptée de ton solde.
        </p>
      </div>
      <div style="text-align:center;">
        ${btn("Voir mon planning", `${SITE_URL}/dashboard`)}
      </div>
    `)
  },

  // 5 — Séance duo (admin)
  {
    title: "Séance duo confirmée",
    subject: "Séance duo confirmée — Renforcement musculaire",
    html: layout(`
      <div style="display:inline-block;background:#16a34a22;border:1px solid #16a34a44;border-radius:8px;padding:6px 14px;margin-bottom:20px;">
        <span style="color:#4ade80;font-size:13px;font-weight:600;">✓ Séance duo confirmée</span>
      </div>
      <h1 style="color:#ffffff;font-size:20px;font-weight:700;margin:0 0 6px;">Renforcement musculaire</h1>
      <p style="color:#9ca3af;font-size:14px;margin:0 0 24px;">Bonjour Samy, ta séance duo est planifiée.</p>
      ${divider}
      <table width="100%" cellpadding="0" cellspacing="0">
        ${row("Date", "Mercredi 25 mars 2026")}
        ${row("Horaire", "08h00 – 09h00")}
        ${row("Coach", "Manon")}
      </table>
      ${divider}
      <div style="background:#f9731611;border:1px solid #f9731633;border-radius:10px;padding:14px;margin-bottom:24px;">
        <p style="color:#fb923c;font-size:13px;font-weight:600;margin:0 0 6px;">⚠️ Politique d'annulation</p>
        <p style="color:#d1d5db;font-size:13px;line-height:1.6;margin:0;">
          Pour annuler, contacte ton coach <strong style="color:#ffffff;">au moins 24h à l'avance</strong>. Sans annulation dans ce délai, la séance sera décomptée de ton solde.
        </p>
      </div>
      <div style="text-align:center;">
        ${btn("Voir mon planning", `${SITE_URL}/dashboard`)}
      </div>
    `)
  },

  // 6 — Rappel 24h
  {
    title: "Rappel — cours demain",
    subject: "Rappel — Yoga Flow demain à 10h00",
    html: layout(`
      <div style="display:inline-block;background:#7c3aed22;border:1px solid #7c3aed44;border-radius:8px;padding:6px 14px;margin-bottom:20px;">
        <span style="color:#a78bfa;font-size:13px;font-weight:600;">⏰ Rappel — demain</span>
      </div>
      <h1 style="color:#ffffff;font-size:20px;font-weight:700;margin:0 0 6px;">Yoga Flow</h1>
      <p style="color:#9ca3af;font-size:14px;margin:0 0 24px;">Bonjour Samy, tu as un cours demain !</p>
      ${divider}
      <table width="100%" cellpadding="0" cellspacing="0">
        ${row("Date", "Jeudi 19 mars 2026")}
        ${row("Horaire", "10h00 – 11h00")}
        ${row("Coach", "Manon")}
      </table>
      ${divider}
      <p style="color:#d1d5db;font-size:14px;line-height:1.7;margin:0 0 20px;">
        Pense à préparer ta tenue et à arriver quelques minutes en avance. À demain !
      </p>
      <div style="text-align:center;">
        ${btn("Voir mon planning", `${SITE_URL}/dashboard`)}
      </div>
    `)
  },

  // 7 — Cours annulé par coach
  {
    title: "Cours annulé par le coach",
    subject: "Cours annulé — Pilates Core",
    html: layout(`
      <div style="display:inline-block;background:#f9731633;border:1px solid #f9731644;border-radius:8px;padding:6px 14px;margin-bottom:20px;">
        <span style="color:#fb923c;font-size:13px;font-weight:600;">Cours annulé</span>
      </div>
      <h1 style="color:#ffffff;font-size:20px;font-weight:700;margin:0 0 6px;">Pilates Core</h1>
      <p style="color:#9ca3af;font-size:14px;margin:0 0 24px;">Bonjour Samy, ce cours a été annulé par le coach.</p>
      ${divider}
      <table width="100%" cellpadding="0" cellspacing="0">
        ${row("Date", "Vendredi 20 mars 2026")}
        ${row("Horaire", "11h00 – 12h00")}
      </table>
      ${divider}
      <p style="color:#d1d5db;font-size:14px;line-height:1.7;margin:0 0 20px;">
        Ta séance a été automatiquement remboursée sur ton solde collectif.
      </p>
      <div style="text-align:center;">
        ${btn("Voir le planning", `${SITE_URL}/dashboard/planning`)}
      </div>
    `)
  },
];

let current = 0;

function show(index, btn) {
  current = index;
  const email = emails[index];
  const frame = document.getElementById('frame');
  frame.srcdoc = email.html;
  document.getElementById('email-title').textContent = email.title;
  document.getElementById('email-subject').textContent = 'Objet : ' + email.subject;
  document.querySelectorAll('#sidebar nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Auto-resize iframe
  frame.onload = () => resizeFrame();
}

function resizeFrame() {
  const frame = document.getElementById('frame');
  try {
    const h = frame.contentDocument.body.scrollHeight;
    frame.style.height = h + 'px';
  } catch(e) {}
}

function setDevice(device, btn) {
  const wrap = document.getElementById('preview-frame-wrap');
  document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (device === 'mobile') {
    wrap.classList.add('mobile');
  } else {
    wrap.classList.remove('mobile');
  }
  setTimeout(resizeFrame, 100);
}

// Init
window.onload = () => {
  const frame = document.getElementById('frame');
  frame.srcdoc = emails[0].html;
  frame.onload = () => resizeFrame();
};
</script>
</body>
</html>
